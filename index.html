<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para o Amor da Minha Vida ❤️</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#ff9a9e,#fad0c4);
display:flex;
justify-content:center;
align-items:flex-start;
min-height:100vh;
padding-top:40px;
margin:0;
overflow-x:hidden;
}

.container{
background:white;
padding:30px;
border-radius:20px;
max-width:600px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
color:#ff4d6d;
margin-bottom:20px;
}

.fotos{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-bottom:20px;
}

.foto img{
width:100%;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

.foto p{
font-size:14px;
margin-top:5px;
color:#666;
}

.mensagem{
font-size:18px;
color:#444;
white-space:pre-line;
margin-top:10px;
min-height:160px;
}

/* CORAÇÕES */

.coracao{
position:fixed;
top:-20px;
color:#ff4d6d;
animation:cair linear forwards;
pointer-events:none;
}

@keyframes cair{
0%{
transform:translateY(-10vh) rotate(0deg);
opacity:1;
}
100%{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}
}

</style>
</head>

<body>

<div class="container">

<h1>Para o Amor da Minha Vida ❤️</h1>

<div class="fotos">

<div class="foto">
<img src="foto1.jpeg">
<p>Nosso dia especial ❤️</p>
</div>

<div class="foto">
<img src="foto2.jpeg">
<p>Momentos que guardo no coração 💍</p>
</div>

<div class="foto">
<img src="foto3.jpeg">
<p>Cada memória ao seu lado é um presente 🥰</p>
</div>

<div class="foto">
<img src="foto4.jpeg">
<p>Até os momentos simples são especiais com você ❤️</p>
</div>

</div>

<div class="mensagem" id="mensagem"></div>

</div>

<script>

/* DIGITAÇÃO DA MENSAGEM */

const texto = `Feliz Dia da Mulher ❤️

Hoje eu só queria te lembrar de uma coisa...

Você é uma das pessoas mais incríveis que já apareceu na minha vida.

Cada momento com você é especial.

Cada risada, cada conversa, cada abraço.

Obrigado por existir.
Obrigado por estar comigo.

Eu te amo muito. ❤️`

let i = 0
const velocidade = 35

function escrever(){

if(i < texto.length){

document.getElementById("mensagem").innerHTML += texto.charAt(i)

i++

setTimeout(escrever, velocidade)

}

}

escrever()

/* MUITOS CORAÇÕES CAINDO */

function criarCoracao(){

const coracao = document.createElement("div")

coracao.classList.add("coracao")

coracao.innerHTML = "❤️"

coracao.style.left = Math.random()*100 + "vw"

coracao.style.fontSize = (Math.random()*20 + 20) + "px"

coracao.style.animationDuration = (Math.random()*3 + 3) + "s"

document.body.appendChild(coracao)

setTimeout(()=>{
coracao.remove()
},6000)

}

/* cria MUITOS corações */

setInterval(criarCoracao,150)

</script>

</body>
</html>
