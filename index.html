<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para o Amor da Minha Vida ❤️</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#ff9a9e,#fad0c4);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:20px;
max-width:600px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
color:#ff4d6d;
}

.fotos{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:20px;
}

.fotos img{
width:100%;
border-radius:10px;
}

.fotos img:nth-child(5){
grid-column:span 2;
}

.mensagem{
font-size:18px;
color:#444;
min-height:120px;
white-space:pre-line;
}

.cursor{
display:inline-block;
width:2px;
background:black;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0;}
100%{opacity:1;}
}

</style>
</head>

<body>

<div class="container">

<h1>Para o Amor da Minha Vida ❤️</h1>

<div class="fotos">

<div class="foto">
<img src="foto1.jpeg">
<p>Nosso dia especial ❤️</p>
</div>

<div class="foto">
<img src="foto2.jpeg">
<p>Momentos que guardo no coração 💍</p>
</div>

<div class="foto">
<img src="foto3.jpeg">
<p>Até os momentos simples são especiais com você 🥰</p>
</div>

<div class="foto">
<img src="foto4.jpeg">
<p>Cada memória ao seu lado é um presente 🎄❤️</p>
</div>

</div>

<div class="mensagem" id="mensagem"></div>

</div>

<script>

const texto = `Feliz Dia da Mulher ❤️

Hoje eu só queria te lembrar de uma coisa...

Você é uma das pessoas mais incríveis que já apareceu na minha vida.

Cada momento com você é especial.

Cada risada, cada conversa, cada abraço.

Obrigado por existir.
Obrigado por estar comigo.

Eu te amo muito. ❤️`;

let i = 0
const velocidade = 40

function escrever(){

if(i < texto.length){

document.getElementById("mensagem").innerHTML += texto.charAt(i)

i++

setTimeout(escrever, velocidade)

}

}

escrever()

</script>

</body>
</html>
