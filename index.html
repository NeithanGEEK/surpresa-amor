<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Para o amor da minha vida ❤️</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#ff758c,#ff7eb3);
margin:0;
color:white;
text-align:center;
overflow-x:hidden;
}

.container{
padding:40px 20px;
max-width:600px;
margin:auto;
}

h1{
font-size:32px;
}

#mensagem{
margin-top:20px;
font-size:18px;
min-height:120px;
}

img{
width:100%;
border-radius:15px;
margin-top:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.heart{
position:fixed;
bottom:-20px;
font-size:20px;
animation: subir 6s linear forwards;
}

@keyframes subir{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-120vh);opacity:0}
}

</style>
</head>

<body>

<div class="container">

<h1>Oi meu amor ❤️</h1>

<p id="mensagem"></p>

<img src="casamento.jpeg">
<img src="beijo nos.jpeg">
<img src="lanche.jpeg">
<img src="natal car.jpeg">

</div>

<script>

/* mensagem digitando */

const texto = `Desde que você entrou na minha vida
tudo ficou mais bonito.

Cada risada sua,
cada momento juntos,
cada memória que a gente criou...

Tudo isso é muito especial pra mim.

Obrigado por estar comigo,
por me apoiar,
por ser quem você é, e me suportar.

Eu te amo ❤️`;

let i = 0;

function escrever(){

if(i < texto.length){
document.getElementById("mensagem").innerHTML += texto.charAt(i);
i++;
setTimeout(escrever,40);
}

}

escrever();

/* corações subindo */

function criarCoracao(){

const coracao = document.createElement("div");

coracao.classList.add("heart");

coracao.style.left = Math.random()*100 + "vw";

coracao.innerText="❤️";

document.body.appendChild(coracao);

setTimeout(()=>{
coracao.remove();
},6000);

}

setInterval(criarCoracao,400);

</script>

</body>
</html>
